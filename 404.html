<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 | Gia laboratory</title>
  <style>
    :root{
      --brand:#111111;
      --accent:#7A1E2C;
      --vivid:#4DA3FF;
      --bg:#F6F3F0;
    }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: linear-gradient(180deg, var(--bg), #ffffff);
      color:var(--brand);
      font-family: system-ui, -apple-system, "Noto Sans JP", Segoe UI, Roboto, sans-serif;
    }
    .card{
      width:min(720px, calc(100% - 40px));
      background:rgba(255,255,255,.75);
      border:1px solid rgba(17,17,17,.10);
      border-radius:22px;
      box-shadow: 0 18px 50px rgba(0,0,0,.10);
      padding:28px 22px;
    }
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:.5rem;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(17,17,17,.62);
      padding:8px 12px;
      border:1px solid rgba(17,17,17,.12);
      border-radius:999px;
      background:rgba(255,255,255,.55);
    }
    .dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--accent);
      box-shadow: 10px 0 0 var(--vivid), 20px 0 0 rgba(17,17,17,.35);
    }
    h1{
      margin:14px 0 6px;
      font-size:34px;
      letter-spacing:.02em;
    }
    p{
      margin:0 0 16px;
      color:rgba(17,17,17,.72);
      line-height:1.8;
      font-size:14px;
    }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:600;
      background:var(--vivid);
      color:#fff;
      box-shadow: 0 12px 30px rgba(77,163,255,.28);
    }
    a:hover{ filter:brightness(.98); }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker"><span class="dot" aria-hidden="true"></span> Gia laboratory</div>
    <h1>404</h1>
    <p>お探しのページが見つかりませんでした。トップページへ戻ります。</p>
    <a href="https://gia01-member.github.io/gia-consulting-site-pro_v2/">Back to Home</a>
  </main>
</body>
</html>
